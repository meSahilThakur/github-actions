#This is workflow name
name: Hello workflow

on:
  workflow_dispatch:             #It will run only when we click [continuous Delivery]
  # push:                        #It will run every time when main branch will update [continuous Deployment]
  #   branches: [main]
  
#These are jobs inside workflow
jobs:
  #This is the name of the job
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: say hello to the users
        run: echo "Hello Friends"

      - name: say hello to username
        run: echo "Hello $USER"

  details:
    runs-on: ubuntu-latest
    steps:
      - name: Version of python, docker etc.
        run: docker --version && python --version
