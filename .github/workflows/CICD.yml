name: CICD          #Name of workflow
on:                 #When it will trigger
  workflow_dispatch:  #It will trigger manually after clicking run

jobs:                        #Here jobs will specified, Every job needs their own runner
  code:                        #This is job 1
    runs-on: ubuntu-latest      #Here we specify image
    steps:
      - name: checkout code
        run: echo "[git clone <url>] code clone from github."

  build:                        #This is job 2
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker Container
        run: echo "Docker Container Build"

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test the Container
        run: echo "Testing the Container"

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"
